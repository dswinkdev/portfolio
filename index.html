<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Derricko Swink | Portfolio</title>
  <link rel="icon" type="image/x-icon" href="assets/DSwink-favicon.ico">

  <meta name="keywords" content="Derricko Swink, Software Developer, Graphic Design, Java, Full-Stack, Web Development"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom Styles -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top left, #0f172a, #020617);
      color: #e2e8f0;
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("assets/starry-background.jpg") no-repeat center center fixed;
  background-size: cover;
  opacity: 0.1;
  pointer-events: none;
  z-index: 0;

  /* Test: add this */
  background-color: rgba(255, 0, 0, 0.2); /* translucent red */
}

    .hero {
      position: relative;
      padding: 4rem 2rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4rem;
      background: url('https://www.transparenttextures.com/patterns/stardust.png'), 
                  radial-gradient(circle at right, #1e293b 10%, #0f172a 80%);
      background-blend-mode: overlay;
      background-repeat: repeat;
      background-position: center;
      background-attachment: fixed;
      z-index: 1;
    }

    .hero-content {
      max-width: 600px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
    }

    .hero h1 span {
      color: #6366f1; /* Electric Indigo */
    }

    .hero p {
      color: #cbd5e1;
      margin-top: 1rem;
      font-size: 1.1rem;
    }

    .btn-custom {
      margin-top: 2rem;
      background-color: #6366f1;
      border: none;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #4f46e5; /* Deeper Electric Indigo */
    }

    .hero-image img {
      max-width: 350px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
    }

    .sidebar {
      position: fixed;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 999;
    }

    .sidebar a {
      color: #cbd5e1;
      text-decoration: none;
      font-size: 1.5rem;
      transition: color 0.2s ease;
    }

    .sidebar a:hover {
      color: #6366f1;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
        gap: 2rem;
      }

      .hero-image img {
        width: 80%;
        max-width: 300px;
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Transforming Ideas<br><span>Into Digital Reality</span></h1>
      <p>I’m Derricko Swink — a creative technologist, designer, and developer driven by meaningful digital experiences.</p>
      <a href="#projects" class="btn btn-custom">My Projects</a>
    </div>
    <div class="hero-image">
      <img src="assets/Derricko-Swink.jpg" alt="Derricko Swink" class="img-fluid">
    </div>
  </section>

  <!-- Sidebar Icons -->
  <div class="sidebar">
    <a href="#"><i class="bi bi-house-door-fill"></i></a>
    <a href="#"><i class="bi bi-person-fill"></i></a>
    <a href="#"><i class="bi bi-briefcase-fill"></i></a>
    <a href="#"><i class="bi bi-chat-dots-fill"></i></a>
    <a href="#"><i class="bi bi-github"></i></a>
  </div>

</body>
</html>
