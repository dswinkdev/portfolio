<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Derricko Swink</title>
  <link rel="icon" type="image/x-icon" href="assets/DSwink-favicon.ico">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Bootstrap CSS and Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(145deg, #000000, #111111);
      color: #f4f4f5;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("assets/starry-background.jpg") repeat center center fixed;
      background-size: cover;
      opacity: 0.05;
      pointer-events: none;
      z-index: 0;
    }

    .contact-section {
      padding: 5rem 1rem;
      max-width: 600px;
      margin: 0 auto;
      z-index: 1;
      position: relative;
    }

    .contact-section h1 {
      font-weight: 900;
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .contact-section p {
      text-align: center;
      color: #d4d4d8;
      margin-bottom: 2.5rem;
    }

    .form-control {
      background-color: #1f1f1f;
      border: 1px solid #333;
      color: #f4f4f5;
      border-radius: 8px;
    }

    .form-control:focus {
      border-color: #e11d48;
      box-shadow: 0 0 0 0.2rem rgba(225, 29, 72, 0.25);
    }

    .btn-custom {
      background-color: #e11d48;
      border: none;
      color: white;
      border-radius: 40px;
      padding: 0.6rem 1.5rem;
      font-weight: 600;
      width: 100%;
    }

    .btn-custom:hover {
      background-color: #be123c;
    }

    .contact-info {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.95rem;
    }

    .contact-info i {
      color: #e11d48;
      margin-right: 0.5rem;
    }

    .sidebar {
      position: fixed;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 999;
    }

    .sidebar a {
      color: #d4d4d8;
      text-decoration: none;
      font-size: 1.5rem;
      transition: color 0.2s ease;
    }

    .sidebar a:hover {
      color: #e11d48;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="contact-section">
    <h1>Contact Me</h1>
    <p>Feel free to reach out for work or just a friendly hello!</p>

    <form>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Name" required />
      </div>
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Email" required />
      </div>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Subject" required />
      </div>
      <div class="mb-3">
        <textarea class="form-control" rows="5" placeholder="Message" required></textarea>
      </div>
      <button type="submit" class="btn btn-custom">Send Message</button>
    </form>

    <div class="contact-info mt-4">
      <p><i class="bi bi-envelope-fill"></i>dswinkdev@gmail.com</p>
      <p><i class="bi bi-telephone-fill"></i>(770) 309-1141</p>
      <p><i class="bi bi-geo-alt-fill"></i>Houston,TX</p>
    </div>
  </div>

  <!-- Sidebar Icons -->
<div class="sidebar">
    <a href="index.html"><i class="bi bi-house-door-fill"></i></a>
    <a href="about.html"><i class="bi bi-person-fill"></i></a>
    <a href="projects.html"><i class="bi bi-briefcase-fill"></i></a>
    <a href="contact.html"><i class="bi bi-chat-dots-fill"></i></a>
    <a href="https://github.com/dswinkdev" target="_blank"><i class="bi bi-github"></i></a>
    <a href="https://www.linkedin.com/in/daswink" target="_blank"><i class="bi bi-linkedin"></i></a>
  </div>  

</body>

</html>
